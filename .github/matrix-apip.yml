# VeeCode APIP build matrix — RHEL 10 only
# Reference file documenting supported targets.
# The apip-release.yml workflow uses an inline matrix for simplicity.

build-packages:
  - label: rhel-10
    runner: ubuntu-24.04
    image: rockylinux:9
    package: rpm
    package-type: el10

  - label: rhel-10-arm64
    runner: ubuntu-24.04-arm
    image: rockylinux:9
    package: rpm
    package-type: el10

build-images:
  - label: rhel10
    base-image: registry.access.redhat.com/ubi10-minimal
    package: rpm
    rpm_platform: el10
    artifact-from: rhel-10
    artifact-from-alt: rhel-10-arm64
    docker-platforms: linux/amd64, linux/arm64
